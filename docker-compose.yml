services:
  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: raiseaplayer_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── NestJS API ──────────────────────────────────────────
  api:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: raiseaplayer_api
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: "production"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      FRONTEND_SOCIAL_SUCCESS_URL: ${FRONTEND_SOCIAL_SUCCESS_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_WEBHOOK_URL: ${RAZORPAY_WEBHOOK_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CONTACT_US_EMAIL: ${CONTACT_US_EMAIL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Next.js Frontend ────────────────────────────────────
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: raiseaplayer_client
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: raiseaplayer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      client:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
